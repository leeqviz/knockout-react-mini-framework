<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockout app</title>
  </head>
  <body>
    <div id="root">
      <nav>
        <a href="/" data-bind="link: true">Home</a>
        <a href="/test" data-bind="link: true">Test</a>
        <button data-bind="navigate: '/test/99'">Test button</button>
        <div>
          <h2>Navigated React app</h2>
          <p>
            Current page:
            <strong data-bind="text: appRouter.currentComponent"></strong>
          </p>
        </div>
      </nav>

      <main
        data-bind="component: {
            name: appRouter.currentComponent,
            params: { withRouter: true }
          }"
      ></main>

      <div class="knockout-app">
        <h2>Knockout app</h2>
        <p class="knockout-data">
          Global date: <strong data-bind="text: date"></strong>
        </p>
        <p>Global count: <strong data-bind="text: count"></strong></p>
        <input
          id="global-count"
          data-bind="value: count, valueUpdate: 'input'"
          type="number"
        />
        <p>Global users:</p>
        <ul data-bind="foreach: users">
          <li data-bind="text: name"></li>
        </ul>
        <button data-bind="click: addUser()">Add user</button>
        <p>Computed result: <strong data-bind="text: result"></strong></p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 20px">
        <h2>Lazy components</h2>
        <main-lazy-component
          class="react-component"
          params="{ withRouter: true }"
        ></main-lazy-component>
        <datepicker-lazy-component
          class="react-component"
          params="{ withRouter: true }"
        ></datepicker-lazy-component>
        <div class="react-component"></div>
      </div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
