<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockout app</title>
  </head>
  <body>
    <div id="root">
      <a href="/" data-bind="router: true">Главная</a>
      <a href="/test/42" data-bind="router: true">Профиль 42</a>

      <button data-bind="click: () => navigate('/test/99')">Профиль 99</button>
      <div class="knockout-app">
        <h2>Knockout app</h2>
        <p class="knockout-data">
          Global date: <strong data-bind="text: globalDate"></strong>
        </p>
        <p>Global count: <strong data-bind="text: globalCount"></strong></p>
        <input
          data-bind="value: globalCount, valueUpdate: 'input'"
          type="number"
        />
        <p>Global users:</p>
        <ul data-bind="foreach: globalUsers">
          <li data-bind="text: name"></li>
        </ul>
        <p>Computed result: <strong data-bind="text: result"></strong></p>
      </div>
      <main
        data-bind="component: {
        name: currentPageComponent,
        params: { globals: $root, route: currentRouteParams }
      }"
      ></main>
      <main-lazy-component
        class="react-component"
        params="{ globals: $root }"
      ></main-lazy-component>
      <datepicker-lazy-component
        class="react-component"
        params="{ globals: $root }"
      ></datepicker-lazy-component>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
