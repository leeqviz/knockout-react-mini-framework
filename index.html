<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockout app</title>
  </head>
  <body>
    <div class="knockout-app">
      <h2>Knockout app</h2>
      <p class="knockout-data">
        Global date: <strong data-bind="text: globalDate"></strong>
      </p>
      <p>Global count: <strong data-bind="text: globalCount"></strong></p>
      <input
        data-bind="value: globalCount, valueUpdate: 'input'"
        type="number"
      />
      <p>Global users:</p>
      <ul data-bind="foreach: globalUsers">
        <li data-bind="text: name"></li>
      </ul>
    </div>
    <br />
    <div
      data-bind="reactMain: { 
            component: reactMainComponent, 
            props: { count: globalCount, setCount: setGlobalCount } 
        }"
    ></div>
    <div
      data-bind="reactDatepicker: { 
            component: reactDatepickerComponent, 
            props: { date: globalDate, setDate: setGlobalDate } 
        }"
    ></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
