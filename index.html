<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockout app</title>
  </head>
  <body>
    <div id="root">
      <nav>
        <a href="/" data-bind="router: true">Home</a>
        <a href="/test/42" data-bind="router: true">Test</a>
        <button data-bind="click: () => navigate('/test/99')">
          Test button
        </button>
      </nav>

      <div class="knockout-app">
        <h2>Knockout app</h2>
        <p class="knockout-data">
          Global date: <strong data-bind="text: globalDate"></strong>
        </p>
        <p>Global count: <strong data-bind="text: globalCount"></strong></p>
        <input
          id="global-count"
          data-bind="value: globalCount, valueUpdate: 'input'"
          type="number"
        />
        <p>Global users:</p>
        <ul data-bind="foreach: globalUsers">
          <li data-bind="text: name"></li>
        </ul>
        <button data-bind="click: addGlobalUser()">Add user</button>
        <p>Computed result: <strong data-bind="text: result"></strong></p>
      </div>

      <div>
        <h2>Navigated React app</h2>
        <p>
          Current page: <strong data-bind="text: currentPageComponent"></strong>
        </p>
        <main
          data-bind="component: {
        name: currentPageComponent,
        params: { globals: $root, route: currentRouteParams }
      }"
        ></main>
      </div>

      <div style="display: flex; flex-direction: column; gap: 20px">
        <h2>Lazy components</h2>
        <main-lazy-component
          class="react-component"
          params="{ globals: $root }"
        ></main-lazy-component>
        <datepicker-lazy-component
          class="react-component"
          params="{ globals: $root }"
        ></datepicker-lazy-component>
      </div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
