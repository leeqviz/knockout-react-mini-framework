<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockout app</title>
  </head>
  <body>
    <div id="root">
      <div class="knockout-app">
        <h2>Knockout app</h2>
        <p class="knockout-data">
          Global date: <strong data-bind="text: globalDate"></strong>
        </p>
        <p>Global count: <strong data-bind="text: globalCount"></strong></p>
        <input
          data-bind="value: globalCount, valueUpdate: 'input'"
          type="number"
        />
        <p>Global users:</p>
        <ul data-bind="foreach: globalUsers">
          <li data-bind="text: name"></li>
        </ul>
      </div>
      <!-- ko with: mainViewModel -->
      <div
        class="react-wrapper"
        data-bind="reactMain: { 
            component: $data.mainComponent, 
            props: { count: $root.globalCount, setCount: $root.setGlobalCount } 
        }"
      ></div>
      <!-- /ko -->
      <!-- ko with: datepickerViewModel -->
      <div
        class="react-wrapper"
        data-bind="reactDatepicker: { 
            component: $data.datepickerComponent, 
            props: { date: $root.globalDate, setDate: $root.setGlobalDate } 
        }"
      ></div>
      <!-- /ko -->
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
